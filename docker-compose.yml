services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: relaychat-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    networks:
      - relaychat-network

  frontend:
    build:
      context: ./relaychat
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    container_name: relaychat-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./relaychat/.env.local
    depends_on:
      - server
    networks:
      - relaychat-network

networks:
  relaychat-network:
    driver: bridge
